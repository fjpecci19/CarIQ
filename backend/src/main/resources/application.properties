spring.application.name=backend
# Propiedad de conexion a Mongo (Spring Boot 4: spring.mongodb.uri).
# Se sobreescribe con la env var SPRING_MONGODB_URI (la inyecta docker-compose
# apuntando al servicio "mongodb"). Si no hay env var (local sin Docker), usa localhost.
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://admin:admin123@localhost:27017/cariq?authSource=admin}